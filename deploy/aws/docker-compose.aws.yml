services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=${RDS_HOST};Port=${RDS_PORT};Database=${RDS_DB};Username=${RDS_USER};Password=${RDS_PASSWORD};SSL Mode=Require;Trust Server Certificate=true
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "8080"
    networks:
      - devboard

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - devboard

networks:
  devboard:
    driver: bridge
